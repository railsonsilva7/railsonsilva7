name: Metrics
on:
  push:
    branches: ["main", "master"]
  schedule: [{cron: "0 0 * * *"}] # Atualiza todos os dias à meia-noite
  workflow_dispatch: # Permite que tu cliques num botão para atualizar na hora
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: railsonsilva7
          template: classic
          base: header, repositories
          # Oculta secões zeros e foca em linguagens usadas
          plugin_languages: yes
          plugin_languages_limit: 8
          config_timezone: America/Sao_Paulo
          filename: github-metrics.svg # Nome do ficheiro que será gerado